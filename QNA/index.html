<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BondPay QNA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ── Dark theme (default) ── */
  :root, [data-theme="dark"] {
    --bg: #09090b;
    --surface: #111113;
    --surface2: #18181b;
    --surface3: #1f1f23;
    --border: rgba(255,255,255,.06);
    --border2: rgba(255,255,255,.1);
    --text: #fafafa;
    --text2: #a1a1aa;
    --text3: #52525b;
    --accent: #818cf8;
    --accent-dim: rgba(129,140,248,.12);
    --green: #34d399;
    --green-dim: rgba(52,211,153,.08);
    --red: #f87171;
    --red-dim: rgba(248,113,113,.08);
    --glow: rgba(129,140,248,.06);
    --overlay: rgba(9,9,11,.92);
    --hint-bg: rgba(9,9,11,.8);
  }

  /* ── Light theme ── */
  [data-theme="light"] {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --surface2: #f0f0f2;
    --surface3: #e5e5ea;
    --border: rgba(0,0,0,.07);
    --border2: rgba(0,0,0,.12);
    --text: #111113;
    --text2: #52525b;
    --text3: #a1a1aa;
    --accent: #6366f1;
    --accent-dim: rgba(99,102,241,.1);
    --green: #10b981;
    --green-dim: rgba(16,185,129,.08);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,.08);
    --glow: rgba(99,102,241,.06);
    --overlay: rgba(245,245,247,.92);
    --hint-bg: rgba(245,245,247,.85);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    transition: background .3s, color .3s;
  }

  /* Glow */
  .glow {
    position: fixed; top: -300px; left: 50%; transform: translateX(-50%);
    width: 800px; height: 800px;
    background: radial-gradient(circle, var(--glow) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
    transition: background .3s;
  }

  /* Shell */
  .shell {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    height: 100dvh;
  }

  /* ── Top bar ── */
  .top {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px; flex-shrink: 0;
    gap: 8px;
  }
  .logo {
    font-size: 11px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text3); white-space: nowrap;
    transition: color .3s;
  }
  .logo span { color: var(--accent); }
  .top-right { display: flex; gap: 4px; flex-shrink: 0; }

  .btn-icon {
    width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--text3); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; font-family: inherit;
    transition: all .15s;
  }
  .btn-icon:hover { border-color: var(--border2); color: var(--text2); }
  .btn-icon.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  /* Theme toggle */
  .theme-toggle {
    width: 52px; height: 28px; border-radius: 14px;
    border: 1px solid var(--border); background: var(--surface2);
    cursor: pointer; position: relative; transition: all .3s;
    flex-shrink: 0;
  }
  .theme-toggle::after {
    content: ''; position: absolute; top: 3px; left: 3px;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--accent); transition: transform .3s;
  }
  [data-theme="light"] .theme-toggle::after { transform: translateX(24px); }
  .theme-toggle .icon {
    position: absolute; top: 0; width: 28px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; transition: opacity .3s;
  }
  .theme-toggle .icon.moon { left: 0; opacity: 1; }
  .theme-toggle .icon.sun  { right: 0; opacity: 0; }
  [data-theme="light"] .theme-toggle .icon.moon { opacity: 0; }
  [data-theme="light"] .theme-toggle .icon.sun  { opacity: 1; }

  /* ── Category pills ── */
  .pills {
    display: flex; gap: 6px; padding: 0 20px 10px; flex-shrink: 0;
    overflow-x: auto; scrollbar-width: none;
  }
  .pills::-webkit-scrollbar { display: none; }
  .pill {
    padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--text3); cursor: pointer;
    font-size: 11px; font-weight: 500; font-family: inherit; white-space: nowrap;
    transition: all .15s; flex-shrink: 0;
  }
  .pill:hover { border-color: var(--border2); color: var(--text2); }
  .pill.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  /* ── Card stage ── */
  .stage {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 0 20px; overflow: hidden; min-height: 0;
  }

  .card {
    width: 100%; max-width: 640px;
    max-height: 100%;
    overflow-y: auto; overflow-x: hidden;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    position: relative;
    transition: opacity .25s, transform .25s, background .3s, border-color .3s;
  }
  .card::-webkit-scrollbar { width: 4px; }
  .card::-webkit-scrollbar-track { background: transparent; }
  .card::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }
  .card.exit-left  { opacity: 0; transform: translateX(-40px) scale(.97); }
  .card.exit-right { opacity: 0; transform: translateX(40px) scale(.97); }
  .card.enter      { opacity: 0; transform: translateY(16px) scale(.98); }
  .card.visible    { opacity: 1; transform: translateY(0) scale(1); }

  .card-meta {
    display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .card-id {
    font-size: 11px; font-weight: 600; color: var(--accent);
    background: var(--accent-dim); padding: 3px 10px; border-radius: 6px;
  }
  .card-cat {
    font-size: 11px; color: var(--text3); background: var(--surface3);
    padding: 3px 10px; border-radius: 6px;
  }

  .card-question {
    font-size: 18px; font-weight: 500; line-height: 1.65;
    color: var(--text); margin-bottom: 8px;
  }
  .card-question-ne {
    font-size: 14px; line-height: 1.55; color: var(--text3); margin-bottom: 0;
  }
  .card-question-ne.show { margin-bottom: 20px; }

  /* Reveal hint */
  .reveal-hint {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px; margin-top: 20px;
    border-radius: 10px; border: 1px dashed var(--border2);
    color: var(--text3); font-size: 13px; cursor: pointer;
    transition: all .2s;
  }
  .reveal-hint:hover { border-color: var(--accent); color: var(--accent); }
  .reveal-hint .kbd {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 20px; height: 20px; padding: 0 5px;
    background: var(--surface3); border: 1px solid var(--border2);
    border-radius: 4px; font-size: 10px; font-weight: 600;
    transition: background .3s, border-color .3s;
  }

  /* Answer area */
  .answer-area {
    max-height: 0; overflow: hidden; opacity: 0;
    transition: max-height .4s ease, opacity .3s ease, margin .3s ease;
    margin-top: 0;
  }
  .answer-area.open { max-height: 500px; opacity: 1; margin-top: 20px; }
  .answer-divider { height: 1px; background: var(--border); margin-bottom: 16px; }
  .answer-label {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--text3); margin-bottom: 8px;
  }
  .answer-text { font-size: 14px; line-height: 1.7; color: var(--text2); }
  .answer-ne {
    font-size: 13px; line-height: 1.7; color: var(--text3);
    margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);
  }

  /* Rating */
  .rating {
    display: flex; gap: 8px; margin-top: 20px;
    opacity: 0; transition: opacity .3s .15s; pointer-events: none;
  }
  .rating.visible { opacity: 1; pointer-events: auto; }
  .rate-btn {
    flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border);
    background: transparent; cursor: pointer;
    font-size: 13px; font-weight: 600; font-family: inherit;
    transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .rate-btn.got { border-color: var(--green); color: var(--green); }
  .rate-btn.got:hover { background: var(--green-dim); }
  .rate-btn.miss { border-color: var(--red); color: var(--red); }
  .rate-btn.miss:hover { background: var(--red-dim); }
  .rate-btn svg { width: 15px; height: 15px; }

  /* ── Bottom bar ── */
  .bottom {
    flex-shrink: 0; padding: 10px 20px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
  }

  .nav-arrows { display: flex; gap: 4px; flex-shrink: 0; }
  .nav-btn {
    width: 36px; height: 36px; border-radius: 9px; border: 1px solid var(--border);
    background: transparent; color: var(--text3); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .nav-btn:disabled { opacity: .2; cursor: default; }

  .dots {
    display: flex; gap: 4px; align-items: center; flex-wrap: nowrap;
    flex: 1; justify-content: center; min-width: 0; overflow: hidden;
  }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--surface3); flex-shrink: 0; transition: all .2s, background .3s;
  }
  .dot.current { background: var(--accent); width: 16px; border-radius: 3px; }
  .dot.seen { background: var(--green); }
  .dot.wrong { background: var(--red); }

  .counter {
    font-size: 11px; color: var(--text3); font-variant-numeric: tabular-nums;
    white-space: nowrap; flex-shrink: 0; min-width: 40px; text-align: right;
  }

  /* ── Inline keyboard hints (inside shell, above bottom) ── */
  .hints {
    display: flex; justify-content: center; gap: 16px; flex-shrink: 0;
    padding: 6px 20px; border-top: 1px solid var(--border);
    background: var(--hint-bg); backdrop-filter: blur(10px);
    transition: background .3s, border-color .3s;
  }
  .hint { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text3); }
  .hint .kbd {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 18px; height: 18px; padding: 0 4px;
    background: var(--surface3); border: 1px solid var(--border2);
    border-radius: 3px; font-size: 9px; font-weight: 600;
    transition: background .3s, border-color .3s;
  }

  /* ── Score overlay ── */
  .overlay {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: var(--overlay); backdrop-filter: blur(20px);
    opacity: 0; pointer-events: none; transition: opacity .3s, background .3s;
  }
  .overlay.visible { opacity: 1; pointer-events: auto; }
  .score-card {
    text-align: center; padding: 40px 32px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; max-width: 360px; width: 88%;
    transform: scale(.95); transition: transform .3s, background .3s, border-color .3s;
  }
  .overlay.visible .score-card { transform: scale(1); }
  .score-big { font-size: 48px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  .score-sub { font-size: 13px; color: var(--text3); margin-bottom: 28px; }
  .score-actions { display: flex; flex-direction: column; gap: 8px; }
  .score-btn {
    padding: 11px 20px; border-radius: 10px; border: 1px solid var(--border);
    background: transparent; color: var(--text2); cursor: pointer;
    font-size: 13px; font-weight: 500; font-family: inherit; transition: all .15s;
  }
  .score-btn:hover { border-color: var(--accent); color: var(--accent); }
  .score-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .score-btn.primary:hover { opacity: .9; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(12px);
    padding: 8px 16px; border-radius: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); font-size: 12px; z-index: 200;
    opacity: 0; transition: all .25s; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ═══════════ RESPONSIVE ═══════════ */

  /* Large screens */
  @media (min-width: 1024px) {
    .card { padding: 40px; border-radius: 20px; }
    .card-question { font-size: 20px; }
    .card-question-ne { font-size: 15px; }
  }

  /* Tablets */
  @media (max-width: 768px) {
    .card { padding: 28px; }
    .card-question { font-size: 17px; }
    .hints { gap: 12px; }
  }

  /* Small phones */
  @media (max-width: 480px) {
    .top { padding: 10px 16px; }
    .pills { padding: 0 16px 8px; }
    .stage { padding: 0 16px; }
    .card { padding: 22px 20px; border-radius: 14px; }
    .card-question { font-size: 15px; line-height: 1.6; }
    .card-question-ne { font-size: 13px; }
    .answer-text { font-size: 13px; }
    .answer-ne { font-size: 12px; }
    .reveal-hint { font-size: 12px; padding: 10px; margin-top: 16px; }
    .rate-btn { padding: 10px; font-size: 12px; }
    .bottom { padding: 8px 16px; }
    .nav-btn { width: 32px; height: 32px; }
    .hints { padding: 5px 12px; gap: 8px; }
    .hint { font-size: 9px; }
    .hint .kbd { min-width: 16px; height: 16px; font-size: 8px; padding: 0 3px; }
    .score-card { padding: 32px 24px; }
    .score-big { font-size: 40px; }
    .logo { font-size: 10px; }
  }

  /* Very small phones (SE, etc) */
  @media (max-width: 360px) {
    .card { padding: 18px 16px; }
    .card-question { font-size: 14px; }
    .card-meta { gap: 6px; margin-bottom: 12px; }
    .card-id, .card-cat { font-size: 10px; padding: 2px 8px; }
    .rating { gap: 6px; }
    .rate-btn { padding: 9px 8px; font-size: 11px; gap: 4px; }
    .rate-btn svg { width: 13px; height: 13px; }
    .btn-icon { width: 28px; height: 28px; font-size: 10px; }
    .theme-toggle { width: 44px; height: 24px; }
    .theme-toggle::after { width: 16px; height: 16px; top: 3px; left: 3px; }
    [data-theme="light"] .theme-toggle::after { transform: translateX(20px); }
    .theme-toggle .icon { width: 24px; height: 22px; font-size: 10px; }
  }

  /* Landscape phones */
  @media (max-height: 500px) and (orientation: landscape) {
    .shell { height: auto; min-height: 100dvh; }
    .stage { flex: none; padding: 12px 20px; }
    .card { max-height: 55dvh; }
    .hints { display: none; }
    .bottom { padding: 6px 20px; }
    .top { padding: 8px 20px; }
    .pills { padding: 0 20px 6px; }
  }

  /* Tall phones (notch safe) */
  @supports (padding-top: env(safe-area-inset-top)) {
    .top { padding-top: max(12px, env(safe-area-inset-top)); }
    .bottom { padding-bottom: max(10px, env(safe-area-inset-bottom)); }
    .hints { padding-bottom: max(6px, env(safe-area-inset-bottom)); }
  }
</style>
</head>
<body>

<div class="glow"></div>

<div class="shell">
  <!-- Top -->
  <div class="top">
    <div class="logo">Bond<span>Pay</span></div>
    <div class="top-right">
      <button class="btn-icon" id="langBtn" title="Toggle language">EN</button>
      <button class="btn-icon" id="shuffleBtn" title="Shuffle">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
      </button>
      <button class="btn-icon" id="resetBtn" title="Reset progress">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 1 3 6.93"/><polyline points="3 22 3 16 9 16"/></svg>
      </button>
      <button class="theme-toggle" id="themeBtn" title="Toggle theme">
        <span class="icon moon">&#9790;</span>
        <span class="icon sun">&#9728;</span>
      </button>
    </div>
  </div>

  <!-- Pills -->
  <div class="pills" id="pills"></div>

  <!-- Card stage -->
  <div class="stage">
    <div class="card visible" id="card">
      <div id="empty" style="display:none;text-align:center;padding:40px 0;color:var(--text3)">
        <div style="font-size:28px;margin-bottom:8px;opacity:.4">&#128269;</div>
        <div style="font-size:14px">No questions found</div>
      </div>
      <div id="cardContent"></div>
    </div>
  </div>

  <!-- Bottom -->
  <div class="bottom">
    <div class="nav-arrows">
      <button class="nav-btn" id="prevBtn" title="Previous">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="nav-btn" id="nextBtn" title="Next">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="dots" id="dots"></div>
    <div class="counter" id="counter">0 / 0</div>
  </div>

  <!-- Keyboard hints — INSIDE shell, above nothing, non-overlapping -->
  <div class="hints" id="hints">
    <div class="hint"><span class="kbd">Space</span> reveal</div>
    <div class="hint"><span class="kbd">&larr;</span><span class="kbd">&rarr;</span> navigate</div>
    <div class="hint"><span class="kbd">1</span> got it &nbsp;<span class="kbd">2</span> missed</div>
  </div>
</div>

<!-- Score overlay -->
<div class="overlay" id="overlay">
  <div class="score-card">
    <div class="score-big" id="scoreBig">0%</div>
    <div class="score-sub" id="scoreSub"></div>
    <div class="score-actions">
      <button class="score-btn primary" id="retryAll">Shuffle &amp; retry</button>
      <button class="score-btn" id="retryMiss">Retry missed</button>
      <button class="score-btn" id="closeScore">Back to study</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  const LS='bondpay_qna_v4';
  const LS_THEME='bondpay_qna_theme';
  let data=[], deck=[], idx=0, cat='all', lang='en', opened=false;

  // ── Theme ──
  function initTheme(){
    const saved=localStorage.getItem(LS_THEME);
    if(saved) document.documentElement.setAttribute('data-theme',saved);
    else {
      // Respect system preference
      const prefersDark=window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', prefersDark?'dark':'light');
    }
  }
  initTheme();

  document.getElementById('themeBtn').onclick=()=>{
    const current=document.documentElement.getAttribute('data-theme');
    const next=current==='dark'?'light':'dark';
    document.documentElement.setAttribute('data-theme',next);
    localStorage.setItem(LS_THEME,next);
  };

  // ── Storage ──
  const prog=()=>{try{return JSON.parse(localStorage.getItem(LS))||{}}catch{return{}}};
  const save=p=>localStorage.setItem(LS,JSON.stringify(p));

  function rate(id,got){
    const p=prog();
    if(!p[id]) p[id]={s:0,c:0,w:0};
    p[id].s=1;
    if(got) p[id].c=(p[id].c||0)+1;
    else if(got===false) p[id].w=(p[id].w||0)+1;
    save(p);
  }
  function getP(id){const p=prog();return p[id]||{s:0,c:0,w:0};}

  function esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'):'';}

  function buildDeck(){
    let l=[...data];
    if(cat!=='all') l=l.filter(q=>q.category===cat);
    deck=l; idx=0; opened=false;
  }

  // ── Categories ──
  function initPills(){
    const cats=[...new Set(data.map(q=>q.category).filter(Boolean))];
    const w=document.getElementById('pills');
    w.innerHTML=`<button class="pill active" data-c="all">All</button>`+
      cats.map(c=>`<button class="pill" data-c="${c}">${c}</button>`).join('');
    w.querySelectorAll('.pill').forEach(b=>{
      b.onclick=()=>{
        w.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        cat=b.dataset.c; buildDeck(); renderCard(); renderDots();
      };
    });
  }

  // ── Render card ──
  function renderCard(anim=''){
    const card=document.getElementById('card');
    const content=document.getElementById('cardContent');
    const empty=document.getElementById('empty');

    if(!deck.length){
      content.innerHTML=''; empty.style.display='';
      document.getElementById('counter').textContent='0 / 0';
      renderDots();
      return;
    }
    empty.style.display='none';

    const q=deck[idx];
    const qt=lang==='ne'?q.question_ne:q.question_en;
    const both=lang==='both';

    if(anim){
      card.classList.remove('visible');
      card.classList.add(anim==='left'?'exit-left':'exit-right');
      setTimeout(()=>{
        card.classList.remove('exit-left','exit-right');
        setContent(q,qt,both);
        card.classList.add('enter');
        requestAnimationFrame(()=>requestAnimationFrame(()=>{
          card.classList.remove('enter'); card.classList.add('visible');
        }));
      },200);
    } else {
      setContent(q,qt,both);
    }

    document.getElementById('prevBtn').disabled=idx===0;
    document.getElementById('nextBtn').disabled=idx===deck.length-1;
    document.getElementById('counter').textContent=`${idx+1} / ${deck.length}`;
    renderDots();
  }

  function setContent(q,qt,both){
    const content=document.getElementById('cardContent');
    opened=false;
    content.innerHTML=`
      <div class="card-meta">
        <span class="card-id">#${q.id}</span>
        ${q.category?`<span class="card-cat">${q.category}</span>`:''}
      </div>
      <div class="card-question">${esc(qt)}</div>
      ${both?`<div class="card-question-ne show">${esc(q.question_ne)}</div>`:''}
      <div class="reveal-hint" id="revealHint" onclick="reveal()">
        <span>Tap to reveal answer</span>
        <span class="kbd">Space</span>
      </div>
      <div class="answer-area" id="answerArea">
        <div class="answer-divider"></div>
        <div class="answer-label">Answer</div>
        <div class="answer-text">${esc(lang==='ne'?q.answer_ne:q.answer_en)}</div>
        ${both?`<div class="answer-ne">${esc(q.answer_ne)}</div>`:''}
      </div>
      <div class="rating" id="rating">
        <button class="rate-btn got" onclick="rateCard(true)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          Got it
        </button>
        <button class="rate-btn miss" onclick="rateCard(false)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          Missed
        </button>
      </div>`;
  }

  window.reveal=function(){
    if(!deck.length) return;
    const area=document.getElementById('answerArea');
    const hint=document.getElementById('revealHint');
    const rating=document.getElementById('rating');
    if(opened) return;
    opened=true;
    area.classList.add('open');
    hint.style.display='none';
    rating.classList.add('visible');
    rate(deck[idx].id, null);
  };

  window.rateCard=function(got){
    if(!deck.length) return;
    rate(deck[idx].id, got);
    toast(got?'Marked as got it':'Marked as missed');
    renderDots();
    setTimeout(()=>{
      if(idx<deck.length-1){ idx++; opened=false; renderCard('left'); }
      else showScore();
    },350);
  };

  // ── Dots ──
  function renderDots(){
    const w=document.getElementById('dots');
    if(!deck.length){ w.innerHTML=''; return; }
    if(deck.length>50){
      const s=Math.max(0,idx-12), e=Math.min(deck.length,idx+13);
      let h='';
      if(s>0) h+='<div class="dot" style="opacity:.3"></div>';
      for(let i=s;i<e;i++){
        const p=getP(deck[i].id);
        let cls='dot';
        if(i===idx) cls+=' current';
        else if(p.w>0) cls+=' wrong';
        else if(p.s) cls+=' seen';
        h+=`<div class="${cls}"></div>`;
      }
      if(e<deck.length) h+='<div class="dot" style="opacity:.3"></div>';
      w.innerHTML=h;
    } else {
      w.innerHTML=deck.map((q,i)=>{
        const p=getP(q.id);
        let cls='dot';
        if(i===idx) cls+=' current';
        else if(p.w>0) cls+=' wrong';
        else if(p.s) cls+=' seen';
        return `<div class="${cls}"></div>`;
      }).join('');
    }
  }

  // ── Nav ──
  document.getElementById('prevBtn').onclick=()=>{
    if(idx>0){ idx--; opened=false; renderCard('right'); }
  };
  document.getElementById('nextBtn').onclick=()=>{
    if(idx<deck.length-1){ idx++; opened=false; renderCard('left'); }
  };

  // ── Keyboard ──
  document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT') return;
    if(e.code==='Space'){ e.preventDefault(); if(!opened) reveal(); }
    if(e.code==='ArrowLeft'){ e.preventDefault(); if(idx>0){ idx--; opened=false; renderCard('right'); } }
    if(e.code==='ArrowRight'){
      e.preventDefault();
      if(idx<deck.length-1){ idx++; opened=false; renderCard('left'); }
      else if(opened) showScore();
    }
    if(e.key==='1'&&opened){ e.preventDefault(); rateCard(true); }
    if(e.key==='2'&&opened){ e.preventDefault(); rateCard(false); }
  });

  // ── Touch swipe ──
  let tx=0;
  document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
  document.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-tx;
    if(Math.abs(dx)>50){
      if(dx<0&&idx<deck.length-1){ idx++; opened=false; renderCard('left'); }
      else if(dx>0&&idx>0){ idx--; opened=false; renderCard('right'); }
    }
  },{passive:true});

  // ── Lang ──
  const langs=['en','ne','both'];
  document.getElementById('langBtn').onclick=()=>{
    const i=langs.indexOf(lang); lang=langs[(i+1)%langs.length];
    document.getElementById('langBtn').textContent=lang.toUpperCase();
    renderCard();
  };

  // ── Shuffle ──
  document.getElementById('shuffleBtn').onclick=()=>{
    for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
    idx=0; opened=false; renderCard(); toast('Shuffled');
  };

  // ── Reset ──
  document.getElementById('resetBtn').onclick=()=>{
    if(confirm('Reset all progress?')){
      localStorage.removeItem(LS); renderDots(); toast('Progress reset');
    }
  };

  // ── Score ──
  function showScore(){
    const p=prog();
    let c=0,w=0;
    deck.forEach(q=>{const s=p[q.id];if(s){if(s.c)c++;if(s.w)w++;}});
    const total=c+w;
    const pct=total?Math.round(c/total*100):0;
    document.getElementById('scoreBig').textContent=pct+'%';
    document.getElementById('scoreSub').textContent=`${c} correct \u00b7 ${w} missed \u00b7 ${deck.length} total`;
    document.getElementById('overlay').classList.add('visible');
  }
  document.getElementById('closeScore').onclick=()=>document.getElementById('overlay').classList.remove('visible');
  document.getElementById('retryAll').onclick=()=>{
    document.getElementById('overlay').classList.remove('visible');
    for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
    idx=0; opened=false; renderCard();
  };
  document.getElementById('retryMiss').onclick=()=>{
    document.getElementById('overlay').classList.remove('visible');
    const p=prog();
    const wl=deck.filter(q=>{const s=p[q.id];return s&&s.w>0;});
    if(!wl.length){toast('Nothing missed');return;}
    deck=wl; idx=0; opened=false;
    for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
    renderCard();
  };

  // ── Toast ──
  function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);}

  // ── Init ──
  (async()=>{
    try{const r=await fetch('data.json');data=await r.json();}
    catch{document.getElementById('cardContent').innerHTML='<div style="text-align:center;color:var(--text3);padding:40px">Failed to load data</div>';return;}
    initPills(); buildDeck(); renderCard();
  })();
})();
</script>
</body>
</html>
